name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Supply-chain gate (#86): fails the build on any RUSTSEC advisory
      # against the resolved dependency graph (tree-sitter, ignore, globset,
      # etc.), plus license/bans/sources per deny.toml at the repo root.
      # `arguments: ""` overrides the action's default `--all-features` so
      # CI resolves the same default-feature graph verified locally.
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          arguments: ""

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --workspace

  slow-tests:
    name: slow-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test -p codeimpact_secondaries_integration_test --test cargo_test_runner_test cargo_test_runner_excludes_build_time_from_measured_duration -- --ignored --exact
      - run: cargo test -p codeimpact_secondaries_integration_test --test parse_probe_timeout_test probe_that_never_exits_is_killed_and_treated_as_source_too_complex -- --ignored --exact

  cross-platform:
    name: cross-platform (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace
      # Proves the #63 canary ONLY (probe discovery, exit-code mapping) on
      # both non-Linux OSes the linux-only `test` job never exercises — NOT
      # the whole secondaries.integration_test suite. That used to run
      # `cargo test -p codeimpact_secondaries_integration_test` wholesale,
      # which also pulled in `cargo_test_runner_test` (the stress-test
      # adapter spawning `cargo test` on a fixture workspace) — pre-existing
      # Windows debt unrelated to #63 that this job was never meant to
      # prove (`TestRunnerError("la compilation des tests a échoué")` on
      # windows-latest). Narrowed to the canary's own test files; each is
      # confirmed to carry no `cfg(unix)` gate. Excluded on purpose:
      # `parse_probe_rlimit_test`/`parse_probe_memory_ceiling_test`
      # (cfg(unix)), `parse_probe_timeout_test` (#[ignore]d, Linux-only via
      # slow-tests), and `cargo_test_runner_test` (the Windows debt above,
      # deferred — not #63's scope). Does NOT run the timeout-kill path for
      # the same #[ignore] reason as slow-tests' own comment.
      - run: >
          cargo test -p codeimpact_secondaries_integration_test
          --test parse_probe_pathological_test
          --test parse_probe_defense_in_depth_test
          --test parse_probe_cache_correctness_test
          --test parse_probe_cache_test
          --test parse_probe_full_pipeline_test
          --test parse_probe_missing_test
          --test parse_probe_unknown_exit_test

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo install cargo-llvm-cov --locked --version 0.8.7
      # `cargo llvm-cov` runs `cargo test` under its own `target/llvm-cov-target`,
      # which builds ONLY test-harness targets — never the codeimpact_secondaries
      # in-lib unit tests' own `[[bin]]` dependency, `codeimpact-parse-probe`
      # (#63). Every in-lib unit test that calls `parse()` now spawns that
      # canary, so without it they all fail with "sonde d'analyse introuvable"
      # under coverage, even though the plain `test` job passes (target-layout
      # luck: `cargo test`'s own `target/debug/` already has the bin from an
      # earlier `cargo build`/`cargo test -p codeimpact_secondaries` step).
      # Building it explicitly into the SAME target-dir before the coverage
      # run — then pointing `CODEIMPACT_PARSE_PROBE` at it for deterministic
      # discovery regardless of internal layout — fixes this without touching
      # `discover_probe_path`'s production behavior (missing probe still fails
      # loudly, no in-process fallback).
      - run: cargo build -p codeimpact_secondaries --bin codeimpact-parse-probe --target-dir target/llvm-cov-target
      - run: echo "CODEIMPACT_PARSE_PROBE=$PWD/target/llvm-cov-target/debug/codeimpact-parse-probe" >> "$GITHUB_ENV"
      # `--no-clean`: cargo-llvm-cov cleans `target/llvm-cov-target` by
      # default before building — which would delete the probe binary just
      # built into it above.
      - run: cargo llvm-cov --workspace --lcov --output-path lcov.info --no-clean
      - run: cargo llvm-cov report --html
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: |
            lcov.info
            target/llvm-cov/html
