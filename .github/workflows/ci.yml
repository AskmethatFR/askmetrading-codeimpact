name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo clippy --workspace --all-targets -- -D warnings

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Supply-chain gate (#86): fails the build on any RUSTSEC advisory
      # against the resolved dependency graph (tree-sitter, ignore, globset,
      # etc.), plus license/bans/sources per deny.toml at the repo root.
      # `arguments: ""` overrides the action's default `--all-features` so
      # CI resolves the same default-feature graph verified locally.
      - uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          arguments: ""

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # #28 (ADR-8.10 hardening): html_renderer_runtime_security_test.rs
      # shells out to a Node/jsdom harness. `ubuntu-latest` bundles SOME
      # Node by default, but that version is an undocumented, moving target
      # — verified locally that jsdom 29's own engines floor
      # (^20.19.0 || ^22.13.0 || >=24.0.0) rejects an otherwise-plausible
      # Node 20.10 with a cryptic ERR_REQUIRE_ESM three layers deep in a
      # transitive dependency. Pinning here removes that ambiguity instead
      # of hoping the runner image's default happens to be new enough; the
      # Rust test itself still fails LOUDLY (never silently) if this step
      # were ever skipped or misconfigured.
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - run: cargo test --workspace

  slow-tests:
    name: slow-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test -p codeimpact_secondaries_integration_test --test cargo_test_runner_test cargo_test_runner_excludes_build_time_from_measured_duration -- --ignored --exact
      - run: cargo test -p codeimpact_secondaries_integration_test --test parse_probe_timeout_test probe_that_never_exits_is_killed_and_treated_as_source_too_complex -- --ignored --exact

  cross-platform:
    name: cross-platform (${{ matrix.os }})
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --workspace
      # Proves the #63 canary ONLY (probe discovery, exit-code mapping) on
      # both non-Linux OSes the linux-only `test` job never exercises — NOT
      # the whole secondaries.integration_test suite. That used to run
      # `cargo test -p codeimpact_secondaries_integration_test` wholesale,
      # which also pulled in `cargo_test_runner_test` (the stress-test
      # adapter spawning `cargo test` on a fixture workspace) — pre-existing
      # Windows debt unrelated to #63 that this job was never meant to
      # prove (`TestRunnerError("la compilation des tests a échoué")` on
      # windows-latest). Narrowed to the canary's own test files; each is
      # confirmed to carry no `cfg(unix)` gate. Excluded on purpose:
      # `parse_probe_rlimit_test`/`parse_probe_memory_ceiling_test`
      # (cfg(unix)), `parse_probe_timeout_test` (#[ignore]d, Linux-only via
      # slow-tests), and `cargo_test_runner_test` (the Windows debt above,
      # deferred — not #63's scope). Does NOT run the timeout-kill path for
      # the same #[ignore] reason as slow-tests' own comment.
      - run: >
          cargo test -p codeimpact_secondaries_integration_test
          --test parse_probe_pathological_test
          --test parse_probe_defense_in_depth_test
          --test parse_probe_cache_correctness_test
          --test parse_probe_cache_test
          --test parse_probe_full_pipeline_test
          --test parse_probe_missing_test
          --test parse_probe_unknown_exit_test

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      # See the `test` job's identical step: scripts/coverage.sh runs the
      # full workspace suite (cargo llvm-cov --workspace), which includes
      # the same Node/jsdom-dependent html_renderer_runtime_security_test.rs
      # (#28, ADR-8.10).
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - run: cargo install cargo-llvm-cov --locked --version 0.8.7
      # scripts/coverage.sh (#87) is the single source of truth for this
      # recipe — see its header comment for the two defects it closes
      # (cross-crate coverage misattribution + spurious
      # Unmeasurable(SourceTooComplex) under a cold coverage build). Local
      # devs run the exact same script, so CI and local coverage can never
      # drift apart.
      - run: ./scripts/coverage.sh
      - run: cargo llvm-cov report --html
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage-report
          path: |
            lcov.info
            target/llvm-cov/html
